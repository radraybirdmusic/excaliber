<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCALIBUR // HUD v1.10</title>
    <style>
        :root { --neon-green: #00ff41; --dark-green: #003b00; --warning-amber: #ffb000; --terminal-black: #050505; --heat-red: #ff4444; }
        body { background: var(--terminal-black); color: var(--neon-green); font-family: 'Courier New', monospace; padding: 15px; }
        #hud-container { max-width: 650px; margin: 0 auto; border: 2px solid var(--neon-green); padding: 15px; }
        .label { color: var(--warning-amber); font-size: 0.85em; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .data-section { border: 1px solid var(--dark-green); padding: 12px; margin-bottom: 15px; background: rgba(0, 59, 0, 0.1); }
        h2 { margin: 5px 0; color: #fff; text-transform: uppercase; }
        #inbox-display { color: #fff; font-style: italic; border-left: 3px solid var(--warning-amber); padding-left: 10px; }
    </style>
</head>
<body>
<div id="hud-container">
    <div class="data-section">
        <div class="label">System Status // RD: <span id="round-num">--</span></div>
        <div id="system-status">SYNCING_PATHWAY...</div>
    </div>
    <div class="data-section">
        <div class="label">Identity</div>
        <h2 id="player-role">--</h2>
    </div>
    <div class="data-section">
        <div class="label">Active Relay // Scenario <span id="scenario-id">--</span></div>
        <div id="inbox-display">...</div>
    </div>
    <div class="data-section">
        <div class="label">Current Objectives</div>
        <ul id="motive-list" style="color:#fff;"></ul>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const myNodeID = params.get('node') || "01";

    function scramble(text, pool) {
        if (!text || !pool) return text;
        let result = text;
        const roll = (arr) => arr[Math.floor(Math.random() * arr.length)];
        while (result.includes("[ADJ]")) result = result.replace("[ADJ]", roll(pool.adjectives));
        while (result.includes("[NOUN]")) result = result.replace("[NOUN]", roll(pool.nouns));
        return result;
    }

    async function updateHUD() {
        try {
            const res = await fetch(`./manifest.json?t=${new Date().getTime()}`);
            const data = await res.json();
            const round = data.current_live_round;
            const scenario = data.active_scenario;
            const nodeName = data.assignments[myNodeID][0];
            
            // Access the Variable Path
            const activeData = data.round_schedule[round][nodeName][scenario];

            document.getElementById('round-num').innerText = round;
            document.getElementById('scenario-id').innerText = scenario.split('_')[1];
            document.getElementById('player-role').innerText = nodeName.replace('NODE_', '');
            document.getElementById('system-status').innerText = `${data.system_status} // ID_${myNodeID}`;

            // Process Scramble Logic
            document.getElementById('inbox-display').innerText = scramble(activeData.mail, data.glitch_pool);

            let mHTML = "";
            activeData.motives.forEach(m => { mHTML += `<li>${scramble(m, data.glitch_pool)}</li>`; });
            document.getElementById('motive-list').innerHTML = mHTML;

        } catch (e) { document.getElementById('system-status').innerText = "PATHWAY_ERROR"; }
    }
    updateHUD();
    setInterval(updateHUD, 10000);
</script>
</body>
</html>
