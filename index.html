<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
let nodes = [];
let currentNodeID = 1; 
let totalNodes = 15;
let currentScreen = "MAIN_HUD"; 

function preload() {
  // Loading directly from ROOT (no folder prefix)
  for (let i = 1; i <= totalNodes; i++) {
    let nodeNum = nf(i, 2); // Handles the 01, 02, etc. format
    // Removed 'assets/' prefix
    nodes[i] = loadImage('node_' + nodeNum + '.png');
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  textFont('monospace');
}

function draw() {
  background(5, 10, 15);
  
  if (currentScreen === "MAIN_HUD") {
    drawMainHUD();
  } else if (currentScreen === "BIO_DETAIL") {
    drawBioDetail();
  } else if (currentScreen === "RECIPE_VAULT") {
    drawRecipeVault();
  }
}

function drawMainHUD() {
  // HUD Frame
  stroke(0, 255, 255, 120);
  strokeWeight(2);
  noFill();
  rect(10, 10, width-20, height-20);
  
  // Character Sprite (Centered Top-ish)
  if (nodes[currentNodeID]) {
    imageMode(CENTER);
    // Scales to 50% of screen width to stay visible on mobile
    let imgSize = width * 0.5;
    image(nodes[currentNodeID], width * 0.5, height * 0.35, imgSize, imgSize);
  }
  
  // Text Overlay
  fill(0, 255, 255);
  noStroke();
  textSize(18);
  textAlign(LEFT);
  text("NODE: " + nf(currentNodeID, 2), 30, 50);
  
  // Interactive Labels
  textAlign(CENTER);
  textSize(14);
  
  // Bio Button Zone (Right Side)
  fill(0, 255, 255, 40);
  rect(width * 0.55, height * 0.6, width * 0.35, 60, 5);
  fill(0, 255, 255);
  text("VIEW BIO", width * 0.72, height * 0.64);

  // Vault Button Zone (Left Side)
  fill(0, 255, 255, 40);
  rect(width * 0.1, height * 0.6, width * 0.35, 60, 5);
  fill(0, 255, 255);
  text("CRi1 VAULT", width * 0.27, height * 0.64);

  // Navigation Hint
  textSize(12);
  fill(0, 255, 255, 150);
  text("< TAP EDGES TO CYCLE 01-15 >", width/2, height - 40);
}

function drawBioDetail() {
  background(10, 20, 40);
  fill(0, 255, 255);
  textAlign(CENTER);
  text("NODE " + currentNodeID + " : BIO DATA", width/2, height/2);
  text("STABILIZING RIPPLE...", width/2, height/2 + 30);
  textSize(12);
  text("TAP TO RETURN", width/2, height - 60);
}

function drawRecipeVault() {
  background(20, 40, 20);
  fill(100, 255, 100);
  textAlign(CENTER);
  text("CRi1 RECIPE VAULT", width/2, height/2);
  text("ACCESSING DIRT-BOX LOGS...", width/2, height/2 + 30);
  textSize(12);
  text("TAP TO RETURN", width/2, height - 60);
}

function touchStarted() {
  if (currentScreen === "MAIN_HUD") {
    // Navigating via tap zones
    if (mouseY > height * 0.6 && mouseY < height * 0.75) {
      if (mouseX > width * 0.5) {
        currentScreen = "BIO_DETAIL";
      } else {
        currentScreen = "RECIPE_VAULT";
      }
    } 
    // Cycling nodes via side taps
    else if (mouseX < width * 0.3) {
      currentNodeID = (currentNodeID === 1) ? 15 : currentNodeID - 1;
    } 
    else if (mouseX > width * 0.7) {
      currentNodeID = (currentNodeID === 15) ? 1 : currentNodeID + 1;
    }
  } else {
    currentScreen = "MAIN_HUD";
  }
  return false;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
