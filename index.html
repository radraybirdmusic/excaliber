<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCALIBUR // HUD v1.05</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-green: #003b00;
            --warning-amber: #ffb000;
            --terminal-black: #050505;
            --heat-red: #ff4444;
        }

        body { background: var(--terminal-black); color: var(--neon-green); font-family: 'Courier New', monospace; padding: 15px; }
        #hud-container { max-width: 650px; margin: 0 auto; border: 2px solid var(--neon-green); padding: 15px; }

        /* Global Broadcast Bar */
        #global-alert {
            background: var(--warning-amber);
            color: black;
            padding: 8px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9em;
            display: none; /* Only shows when data exists */
        }

        .header-grid { display: grid; grid-template-columns: 1fr auto; border-bottom: 2px solid var(--neon-green); padding-bottom: 10px; margin-bottom: 20px; }
        .round-badge { border: 1px solid var(--neon-green); padding: 5px 15px; background: var(--dark-green); font-weight: bold; }
        .label { color: var(--warning-amber); font-size: 0.85em; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .data-section { border: 1px solid var(--dark-green); padding: 12px; margin-bottom: 15px; background: rgba(0, 59, 0, 0.1); }
        
        /* Private Messaging Box */
        #private-msg-box { border: 1px solid var(--neon-green); padding: 10px; background: #001a00; color: #fff; font-style: italic; min-height: 40px; }
        
        .new-msg-flash { animation: alert-flash 0.5s 4; }
        @keyframes alert-flash { 0% { background: var(--heat-red); } 100% { background: transparent; } }
    </style>
</head>
<body>

<div id="hud-container">
    <div id="global-alert">!! INCOMING BROADCAST !!</div>

    <div class="header-grid">
        <div>
            <div class="label">System Status</div>
            <div id="system-status">CONNECTING...</div>
        </div>
        <div class="round-badge">RD: <span id="round-num">--</span></div>
    </div>

    <div class="data-section">
        <div class="label">Node ID Assigned</div>
        <h2 id="player-role">--</h2>
        <p id="player-bio" style="color: #ccc; font-size: 0.9em;"></p>
    </div>

    <div class="data-section">
        <div class="label">Active Mission Motives</div>
        <ul id="motive-list" style="color:#fff;"></ul>
    </div>

    <div class="data-section">
        <div class="label">Nodal Post // Encrypted Messages</div>
        <div id="private-msg-box">Scanning for incoming data...</div>
    </div>

    <div id="quest-ledger" style="display:none; border: 1px double var(--heat-red); padding: 10px; color: var(--heat-red);">
        <div class="label" style="color: var(--heat-red);">!! THE RESTORED CHRONICLE !!</div>
        <div id="quest-list"></div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const myNodeID = params.get('node') || "01";
    let lastMessage = ""; // To detect new mail

    async function updateHUD() {
        try {
            const res = await fetch(`./manifest.json?t=${new Date().getTime()}`);
            const data = await res.json();
            const round = data.current_live_round;
            const nodeName = data.assignments[myNodeID][0];
            const schedule = data.round_schedule[round][nodeName];

            // Update Basics
            document.getElementById('round-num').innerText = round;
            document.getElementById('player-role').innerText = nodeName.replace('NODE_', '');
            document.getElementById('player-bio').innerText = data.library[nodeName].bio;
            document.getElementById('system-status').innerText = `${data.system_status} // ID_${myNodeID}`;

            // Update Motives
            let mHTML = "";
            schedule.motives.forEach(m => { mHTML += `<li>${m}</li>`; });
            document.getElementById('motive-list').innerHTML = mHTML;

            // --- MESSAGING LOGIC ---
            
            // 1. Global Broadcast
            const globalBox = document.getElementById('global-alert');
            if (data.communications && data.communications.global_broadcast) {
                globalBox.innerText = ">> " + data.communications.global_broadcast;
                globalBox.style.display = "block";
            } else {
                globalBox.style.display = "none";
            }

            // 2. Private Node Mail
            const msgBox = document.getElementById('private-msg-box');
            const newMsg = data.communications?.private_mail?.[myNodeID] || "No new messages in queue.";
            
            if (newMsg !== lastMessage && newMsg !== "No new messages in queue.") {
                msgBox.classList.add('new-msg-flash'); // Flash the box
                setTimeout(() => msgBox.classList.remove('new-msg-flash'), 2000);
                lastMessage = newMsg;
            }
            msgBox.innerText = newMsg;

            // 3. Ledger Logic
            const ledger = document.getElementById('quest-ledger');
            if (data.ledger_visibility === "VISIBLE") {
                ledger.style.display = "block";
                let qHTML = "<ul>";
                for (let n in data.round_schedule[round]) {
                    qHTML += `<li><strong>${n.replace('NODE_', '')}:</strong> ${data.round_schedule[round][n].motives[0]}</li>`;
                }
                document.getElementById('quest-list').innerHTML = qHTML + "</ul>";
            } else { ledger.style.display = "none"; }

        } catch (e) { document.getElementById('system-status').innerText = "CONNECTION LOST..."; }
    }

    updateHUD();
    setInterval(updateHUD, 10000);
</script>
</body>
</html>
