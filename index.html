<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCALIBUR // HUD v1.14</title>
    <style>
        :root { --neon-green: #00ff41; --dark-green: #003b00; --warning-amber: #ffb000; --terminal-black: #050505; }
        body { background: var(--terminal-black); color: var(--neon-green); font-family: 'Courier New', monospace; padding: 15px; }
        #hud-container { max-width: 650px; margin: 0 auto; border: 2px solid var(--neon-green); padding: 15px; }
        .label { color: var(--warning-amber); font-size: 0.85em; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .data-section { border: 1px solid var(--dark-green); padding: 12px; margin-bottom: 15px; background: rgba(0, 59, 0, 0.1); }
        .node-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 5px; margin: 10px 0; }
        .node-btn { border: 1px solid var(--neon-green); color: var(--neon-green); background: transparent; padding: 5px; cursor: pointer; font-size: 0.7em; }
        .node-btn.selected { background: var(--neon-green); color: black; font-weight: bold; }
        textarea { width: 100%; background: #111; color: #fff; border: 1px solid var(--dark-green); padding: 10px; font-family: monospace; resize: none; box-sizing: border-box; }
        .action-btn { width: 100%; background: var(--neon-green); color: black; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        #inbox-list { list-style: none; padding: 0; font-size: 0.85em; color: #fff; max-height: 150px; overflow-y: auto; }
        #inbox-list li { border-bottom: 1px solid var(--dark-green); padding: 8px 0; }
    </style>
</head>
<body>

<div id="hud-container">
    <div class="data-section">
        <div class="label">System Status // <span id="player-role">--</span></div>
        <div id="system-status">CONNECTING TO BUCKET...</div>
    </div>

    <div class="data-section" style="border-color: var(--warning-amber);">
        <div class="label" style="color: var(--warning-amber);">Shared Ledger // Decrypted For Your Node</div>
        <ul id="inbox-list"><li>Scanning archive...</li></ul>
    </div>

    <div class="data-section">
        <div class="label">Outgoing Relay // Shoot to Bucket</div>
        <div class="node-selector" id="target-grid"></div>
        <textarea id="msg-input" rows="2" placeholder="Input transmission..."></textarea>
        <button class="action-btn" onclick="shootToBucket()">Execute Transmission</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const myNodeID = params.get('node') || "01";
    const BUCKET_URL = "PASTE_YOUR_GOOGLE_WEB_APP_URL_HERE"; 
    let selectedNodes = [];

    // Init Target Grid
    const grid = document.getElementById('target-grid');
    for (let i = 1; i <= 15; i++) {
        let id = i.toString().padStart(2, '0');
        if (id === myNodeID) continue;
        let btn = document.createElement('button');
        btn.className = 'node-btn'; btn.innerText = "NODE_" + id;
        btn.onclick = () => {
            btn.classList.toggle('selected');
            if (selectedNodes.includes(id)) selectedNodes = selectedNodes.filter(n => n !== id);
            else selectedNodes.push(id);
        };
        grid.appendChild(btn);
    }

    async function updateHUD() {
        try {
            // Pull from Manifest for Role/Bio
            const resMan = await fetch(`./manifest.json?t=${new Date().getTime()}`);
            const manData = await resMan.json();
            document.getElementById('player-role').innerText = manData.assignments[myNodeID][0];

            // Pull from Google Bucket for Messages
            const resBucket = await fetch(BUCKET_URL);
            const bucketData = await resBucket.json();
            const inbox = document.getElementById('inbox-list');
            
            let foundMail = "";
            // Reverse loop to show newest first. Skip row 0 (headers).
            for(let i = bucketData.length - 1; i > 0; i--) {
                let [time, src, targets, msg] = bucketData[i];
                if (targets.includes(myNodeID)) {
                    foundMail += `<li><span style="color:var(--warning-amber)">[FROM_${src}]</span> ${msg}</li>`;
                }
            }
            inbox.innerHTML = foundMail || "<li>No decrypted data found.</li>";
            document.getElementById('system-status').innerText = "BUCKET_SYNC_OK";

        } catch (e) { document.getElementById('system-status').innerText = "BUCKET_OFFLINE"; }
    }

    async function shootToBucket() {
        const msg = document.getElementById('msg-input').value;
        if (selectedNodes.length === 0 || !msg) return;

        const payload = { source: myNodeID, targets: selectedNodes.join(','), msg: msg };

        try {
            await fetch(BUCKET_URL, {
                method: 'POST',
                mode: 'no-cors', // Needed for Google Apps Script redirects
                body: JSON.stringify(payload)
            });
            document.getElementById('msg-input').value = "";
            selectedNodes = [];
            document.querySelectorAll('.node-btn').forEach(b => b.classList.remove('selected'));
            alert("TRANSMISSION SHOT");
            setTimeout(updateHUD, 2000); // Pulse again to show the sent message
        } catch (e) { alert("SHOT_FAILED"); }
    }

    updateHUD();
    setInterval(updateHUD, 15000); // Check bucket every 15s
</script>
</body>
</html>
